services:
  postgres:
    image: postgres:17-alpine
    container_name: familien-kochbuch-postgres
    environment:
      POSTGRES_DB: familien_kochbuch
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d familien_kochbuch"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: familien-kochbuch-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: familien-kochbuch-seaweedfs
    # Master + volume + filer, no S3 gateway. The filer speaks plain
    # HTTP on port 8333 (PUT/GET/DELETE against raw paths). We talk to
    # it from the API container over the internal docker network; the
    # port is intentionally NOT published to the host.
    command: server -filer -dir=/data -filer.port=8333
    volumes:
      - seaweedfs-data:/data
    expose:
      - "8333"
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: familien-kochbuch-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Database=familien_kochbuch;Username=app;Password=dev"
      ConnectionStrings__Redis: "redis:6379"
      # Seeded admin (first boot only). Falls back to SeedDataService's
      # compiled defaults + a loud warning when unset.
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@familien-kochbuch.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-ChangeMe!Admin2026}"
      ADMIN_DISPLAY_NAME: "${ADMIN_DISPLAY_NAME:-Familienkoch}"
      # JWT signing key — MUST be set in production via the .env file.
      # Also drives the per-URL photo signatures (SHA256 over "img-sign:" + this).
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY:-dev-only-signing-key-replace-via-JWT_SIGNING_KEY-env-var}"
      App__FrontendBaseUrl: "${APP_FRONTEND_BASE_URL:-http://localhost}"
      # SeaweedFS filer (plain HTTP, internal docker network). The photo
      # upload + proxy endpoints both route through this URL.
      SeaweedFS__FilerUrl: "${SEAWEEDFS_FILER_URL:-http://seaweedfs:8333}"
      # Signed photo URLs expire after this many hours (default 2 h).
      Images__SignatureValidityHours: "${IMAGES_SIGNATURE_VALIDITY_HOURS:-2}"
      # ── P2-5: Python extractor bridge ───────────────────────────
      # HMAC shared secret — MUST match the python-extractor container.
      EXTRACTOR_SHARED_SECRET: "${EXTRACTOR_SHARED_SECRET:-dev-only-shared-secret}"
      # Base URL of the internal Python service (docker hostname).
      PythonExtractor__BaseUrl: "${PYTHON_EXTRACTOR_BASE_URL:-http://python-extractor:8000}"
      # PV2 hotfix — URL that Python should POST progress callbacks
      # back to. This is *how Python sees the api container*, i.e. the
      # docker-internal hostname. The .NET runner reads this env var
      # and bakes it into the callback_url it hands to Python on every
      # /extract/url and /extract/photos dispatch.
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://api:5000}"
      # ── Orchestrator bot (OPS1) ─────────────────────────────────
      ORCHESTRATOR_PASSWORD: ${ORCHESTRATOR_PASSWORD:-}
      ORCHESTRATOR_PASSWORD_ROTATE: ${ORCHESTRATOR_PASSWORD_ROTATE:-}
      # ── Hangfire worker cap (IF1) ───────────────────────────────
      HANGFIRE_WORKERS: ${HANGFIRE_WORKERS:-}
      # ── CR2: Azure OpenAI (native .NET chat turn) ───────────────
      # Reused from the Python extractor's env; ChatDeployment falls
      # back to Deployment inside AzureOpenAIOptions.ResolveChatDeployment
      # when blank. API key is secret — .NET reads via IOptions only,
      # never logs.
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      AzureOpenAI__ApiVersion: "${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}"
      AzureOpenAI__Deployment: "${AZURE_OPENAI_DEPLOYMENT_STRUCTURING:-gpt-4.1-mini}"
      AzureOpenAI__ChatDeployment: "${AZURE_OPENAI_DEPLOYMENT_CHAT:-gpt-5.1-chat}"
      # ── PF3: SMTP for password-reset + invite emails ─────────────
      # Leave empty in dev to fall back to NoOpEmailSender (links appear
      # in the api container logs). Mirror of the prod compose block so
      # a developer can point at Mailpit / a real sandbox account.
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__User: "${SMTP_USER:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Familien-Kochbuch}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: familien-kochbuch-web
    depends_on:
      - api
    restart: unless-stopped

  python-extractor:
    # Phase 2 recipe-extraction microservice (P2-0 scaffold — currently
    # only exposes GET /health; business endpoints land in P2-1 onward).
    # NOT published to the host — reachable only on the internal docker
    # network. The .NET API will proxy in P2-6.
    build:
      context: ./apps/python-extractor
      dockerfile: Dockerfile
    container_name: familien-kochbuch-python-extractor
    environment:
      # Azure OpenAI (placeholders until P2-1).
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY:-}"
      AZURE_OPENAI_API_VERSION: "${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}"
      AZURE_OPENAI_DEPLOYMENT_STRUCTURING: "${AZURE_OPENAI_DEPLOYMENT_STRUCTURING:-gpt-4.1-mini}"
      AZURE_OPENAI_DEPLOYMENT_CHAT: "${AZURE_OPENAI_DEPLOYMENT_CHAT:-gpt-5.1-chat}"
      # HMAC shared secret for the .NET ↔ Python bridge (P2-6).
      EXTRACTOR_SHARED_SECRET: "${EXTRACTOR_SHARED_SECRET:-dev-only-shared-secret}"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: familien-kochbuch-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

# PV1 security — pin the default compose network to an explicit /16 so
# the .NET InternalOnlyMiddleware's CIDR allowlist (172.28.0.0/16) stays
# reliable. Docker's default pool would otherwise pick any 172.19+ block,
# silently causing the middleware to reject legitimate python-extractor
# callbacks with a 404 in production. Changing this subnet REQUIRES
# updating InternalOnlyMiddleware.DefaultAllowedCidrs in lockstep (or
# overriding via the InternalOrigin:AllowedCidrs config key).
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
  seaweedfs-data:
  caddy-data:
  caddy-config:
