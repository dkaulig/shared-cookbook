<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!--
      iOS Safari still ignores `manifest.icons` when the user picks
      "Add to Home Screen". Serve the same PNG via the Apple-specific
      `apple-touch-icon` links so the tile renders correctly on iPhone.
    -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#4f7961" />
    <!--
      iOS Safari home-screen polish (DS7). These four meta tags make the
      installed app look native: hide the browser chrome, use the sage
      status bar, reuse the short name "Kochbuch" as the tile label, and
      paint the neutral splash behind the launch screen.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kochbuch" />
    <meta name="description" content="Familien-Kochbuch — eine private Rezept-Sammlung für Familie und Freunde." />
    <title>Familien-Kochbuch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
