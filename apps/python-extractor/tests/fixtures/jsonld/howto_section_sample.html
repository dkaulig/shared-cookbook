<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lasagna Bolognese</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Lasagna Bolognese",
    "recipeYield": "6-8 servings",
    "prepTime": "PT45M",
    "cookTime": "PT2H",
    "recipeIngredient": [
      "1 lb ground beef",
      "1 onion",
      "500 ml tomato passata",
      "300 g lasagna sheets",
      "500 ml bechamel sauce"
    ],
    "recipeInstructions": [
      {
        "@type": "HowToSection",
        "name": "Make the ragu",
        "itemListElement": [
          { "@type": "HowToStep", "text": "Brown the beef with diced onion." },
          { "@type": "HowToStep", "text": "Add passata, simmer 30 minutes." }
        ]
      },
      {
        "@type": "HowToSection",
        "name": "Assemble",
        "itemListElement": [
          { "@type": "HowToStep", "text": "Layer pasta, ragu, bechamel." },
          { "@type": "HowToStep", "text": "Repeat three times." }
        ]
      },
      {
        "@type": "HowToStep",
        "text": "Bake at 375°F for 45 minutes."
      }
    ]
  }
  </script>
</head>
<body></body>
</html>
