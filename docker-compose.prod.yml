# Production docker-compose. Expects the API + web images to be prebuilt
# and pushed to GHCR by .github/workflows/deploy.yml.
#
# On the target server, run:
#   CADDY_DOMAIN=kochbuch.example.com docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# For local prod-mode sanity testing, set CADDY_DOMAIN=localhost and
# disable TLS in the Caddyfile (see comment inline there).
services:
  postgres:
    image: postgres:17-alpine
    container_name: familien-kochbuch-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familien_kochbuch}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-familien_kochbuch}"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: familien-kochbuch-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: familien-kochbuch-seaweedfs
    command: server -filer -dir=/data -filer.port=8333
    volumes:
      - seaweedfs-data:/data
    expose:
      - "8333"
    restart: unless-stopped

  api:
    image: ghcr.io/kay-solutions/familien-kochbuch-api:latest
    container_name: familien-kochbuch-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Database=${POSTGRES_DB:-familien_kochbuch};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Familienkoch}
      # CRITICAL: must be set in production — used for JWT signing AND
      # photo URL HMACs. Rotate via CI/CD + rolling restart.
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      App__FrontendBaseUrl: "https://${CADDY_DOMAIN}"
      SeaweedFS__FilerUrl: "http://seaweedfs:8333"
      Images__SignatureValidityHours: "${IMAGES_SIGNATURE_VALIDITY_HOURS:-2}"
      # ── P2-5: Python extractor bridge ───────────────────────────
      EXTRACTOR_SHARED_SECRET: ${EXTRACTOR_SHARED_SECRET}
      PythonExtractor__BaseUrl: "${PYTHON_EXTRACTOR_BASE_URL:-http://python-extractor:8000}"
      # PV2 hotfix — callback base URL baked into /extract/* requests
      # so Python can POST progress back to api. Override in prod only
      # if api runs under a non-default hostname/port in the compose net.
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://api:5000}"
      # ── Orchestrator bot (OPS1) ─────────────────────────────────
      ORCHESTRATOR_PASSWORD: ${ORCHESTRATOR_PASSWORD:-}
      ORCHESTRATOR_PASSWORD_ROTATE: ${ORCHESTRATOR_PASSWORD_ROTATE:-}
      # ── Hangfire worker cap (IF1) ───────────────────────────────
      HANGFIRE_WORKERS: ${HANGFIRE_WORKERS:-}
      # SMTP for password-reset emails — configure a Migadu/Posteo account.
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-Familien-Kochbuch}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0

  web:
    image: ghcr.io/kay-solutions/familien-kochbuch-web:latest
    container_name: familien-kochbuch-web
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25

  python-extractor:
    # Phase 2 recipe-extraction microservice (P2-0 scaffold).
    # NOT published to the host — reachable only on the internal docker
    # network. The .NET API will proxy in P2-6.
    image: ghcr.io/kay-solutions/familien-kochbuch-python-extractor:latest
    container_name: familien-kochbuch-python-extractor
    environment:
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}
      AZURE_OPENAI_DEPLOYMENT_STRUCTURING: ${AZURE_OPENAI_DEPLOYMENT_STRUCTURING:-gpt-4.1-mini}
      AZURE_OPENAI_DEPLOYMENT_CHAT: ${AZURE_OPENAI_DEPLOYMENT_CHAT:-gpt-5.1-chat}
      EXTRACTOR_SHARED_SECRET: ${EXTRACTOR_SHARED_SECRET}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Whisper large-v3 resident ~3 GB; 8 GB leaves room for 2 parallel
    # transcriptions + yt-dlp buffers. Hetzner CPX41 has 16 GB total.
    # CPU cap: 6 cores, leaves 2 for api/postgres/caddy during transcription bursts.
    mem_limit: 8g
    cpus: "6.0"

  caddy:
    image: caddy:2-alpine
    container_name: familien-kochbuch-caddy
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

# PV1 security — pin the default compose network to an explicit /16 so
# the .NET InternalOnlyMiddleware's CIDR allowlist (172.28.0.0/16) stays
# reliable. Docker's default pool would otherwise pick any 172.19+ block,
# silently causing the middleware to reject legitimate python-extractor
# callbacks with a 404 in production. Changing this subnet REQUIRES
# updating InternalOnlyMiddleware.DefaultAllowedCidrs in lockstep (or
# overriding via the InternalOrigin:AllowedCidrs config key).
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
  redis-data:
  seaweedfs-data:
  caddy-data:
  caddy-config:
