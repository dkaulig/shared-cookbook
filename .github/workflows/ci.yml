name: CI

# Fast test feedback on every PR to main AND every push to main.
# Three parallel jobs (api / web / shared) fan out from a path-filter
# detector so irrelevant jobs skip when the change doesn't touch them.
# Deploy is separate (deploy.yml, tag- or dispatch-triggered).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            shared:
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            python:
              - 'apps/python-extractor/**'

  test-api:
    name: test-api
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore apps/api/FamilienKochbuch.sln
      - name: Build
        run: dotnet build apps/api/FamilienKochbuch.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test apps/api/FamilienKochbuch.sln --configuration Release --no-build --verbosity normal

  test-web:
    name: test-web
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @familien-kochbuch/web lint
      - name: Test
        run: pnpm --filter @familien-kochbuch/web test
      - name: Build
        run: pnpm --filter @familien-kochbuch/web build

  test-shared:
    name: test-shared
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @familien-kochbuch/shared test

  test-python:
    name: test-python
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    defaults:
      run:
        working-directory: apps/python-extractor
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        # Pinned uv version matches the one baked into the Dockerfile;
        # bump both together.
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Sync dependencies (frozen)
        run: uv sync --all-extras --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy --strict src tests
      - name: Pytest
        run: uv run pytest -v
