name: Deploy

# Runs on every push to main. Builds the API + web images, pushes them
# to GHCR tagged with both `:latest` and `:${{ github.sha }}`, then
# (eventually) deploys to the production VPS. Until that VPS exists
# the `deploy` job is stubbed out — see the commented-out step below.

on:
  # Tag-based release: push a `vMAJOR.MINOR.PATCH` tag to cut a release.
  # Example: git tag v0.1.0 && git push origin v0.1.0
  push:
    tags:
      - 'v*'
  # Manual dispatch: Actions → Deploy → "Run workflow" for ad-hoc deploys
  # off any branch. Useful for hotfixes and first-time setup.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kay-solutions/familien-kochbuch

jobs:
  test-api:
    name: test:api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore apps/api/FamilienKochbuch.sln
      - name: Build
        run: dotnet build apps/api/FamilienKochbuch.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test apps/api/FamilienKochbuch.sln --configuration Release --no-build

  test-web:
    name: test:web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @familien-kochbuch/web lint
      - name: Test
        run: pnpm --filter @familien-kochbuch/web test

  test-shared:
    name: test:shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @familien-kochbuch/shared test

  test-python:
    name: test:python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/python-extractor
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Sync dependencies (frozen)
        run: uv sync --all-extras --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy --strict src tests
      - name: Pytest
        run: uv run pytest -v

  build-api:
    name: build:api
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: build:web
    runs-on: ubuntu-latest
    needs: [test-web, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-python:
    name: build:python
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push Python extractor image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/python-extractor
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-python-extractor:latest
            ${{ env.IMAGE_PREFIX }}-python-extractor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-python]
    steps:
      - uses: actions/checkout@v4
      - name: Sync compose + Caddyfile to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,infra/Caddyfile.prod"
          target: /srv/familien-kochbuch/
          overwrite: true
      - name: Write env file
        uses: appleboy/ssh-action@v1.2.5
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PROD_ENV
          script: |
            cd /srv/familien-kochbuch
            printf '%s\n' "$PROD_ENV" > .env
            chmod 600 .env
      - name: Docker login on VPS (GHCR read)
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_ACTOR" --password-stdin
      - name: Pull + restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/familien-kochbuch
            docker compose -f docker-compose.prod.yml pull api web python-extractor
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
