name: Deploy

# NOTE FOR FORKS / EXTERNAL CONTRIBUTORS
# --------------------------------------
# This workflow deploys to the maintainer's VPS via tag-only triggers.
# It will not work for you out-of-the-box: it expects GHCR images under
# the repository owner's namespace (`shared-cookbook-*`) and three repo
# secrets (`VPS_HOST`, `VPS_SSH_KEY`, `PROD_ENV`) that only the
# maintainer can set. A push to a fork will fail at the SSH step.
#
# If you fork this project to self-host: redirect the GHCR image paths
# in `env.IMAGE_PREFIX` and the matrix in the `prune-ghcr` job to your
# own GHCR namespace, then set your own `VPS_HOST` / `VPS_SSH_KEY` /
# `PROD_ENV` secrets. See README.md for the no-CI path (running
# everything via `docker compose` locally).
#
# Triggers: tag push (`v*`) or manual dispatch only — fork PRs cannot
# run this workflow, so secrets stay isolated by GitHub default.
#
# Builds the API, web, and python-extractor images, pushes them to
# GHCR tagged with both `:latest` and the commit SHA, then rsyncs the
# compose file + env to the VPS and pulls + restarts.

# VPS LAYOUT (maintainer-internal)
# --------------------------------
# Deploy directory: /srv/shared-cookbook (renamed from /srv/familien-kochbuch
# during the 2026-04-25 brand consolidation). Docker-compose volumes were
# created with the old project name prefix `familien-kochbuch_*` and are
# preserved through the rename — the secrets.PROD_ENV blob includes
# `COMPOSE_PROJECT_NAME=familien-kochbuch` so docker-compose continues to
# resolve to the existing volumes (postgres-data, seaweedfs-data, etc.)
# rather than creating fresh empty ones. If you fork + self-host, drop
# the COMPOSE_PROJECT_NAME override — your stack starts fresh under
# `shared-cookbook_*` volumes naturally.

on:
  # Tag-based release: push a `vMAJOR.MINOR.PATCH` tag to cut a release.
  # Example: git tag v0.1.0 && git push origin v0.1.0
  push:
    tags:
      - 'v*'
  # Manual dispatch: Actions → Deploy → "Run workflow" for ad-hoc deploys
  # off any branch. Useful for hotfixes and first-time setup.
  workflow_dispatch:

# Least-privilege at the workflow level: read source, write to GHCR.
# The `prune-ghcr` job re-asserts `packages: write` for clarity.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires repository names to be lowercase. github.repository_owner
  # preserves the user-account casing (e.g. "dKaulig"); each build job below
  # computes a lowercased OWNER_LC into $GITHUB_ENV before the buildx step
  # so we get `ghcr.io/dkaulig/...` regardless of how the owner is spelled.

jobs:
  test-api:
    name: test:api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore apps/api/SharedCookbook.sln
      - name: Build
        run: dotnet build apps/api/SharedCookbook.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test apps/api/SharedCookbook.sln --configuration Release --no-build

  test-web:
    name: test:web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @shared-cookbook/web lint
      - name: Test
        run: pnpm --filter @shared-cookbook/web test

  test-shared:
    name: test:shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @shared-cookbook/shared test

  test-python:
    name: test:python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/python-extractor
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Sync dependencies (frozen)
        run: uv sync --all-extras --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy --strict src tests
      - name: Pytest
        run: uv run pytest -v

  build-api:
    name: build:api
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/shared-cookbook" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: build:web
    runs-on: ubuntu-latest
    needs: [test-web, test-shared]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/shared-cookbook" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-python:
    name: build:python
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/shared-cookbook" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push Python extractor image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/python-extractor
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-python-extractor:latest
            ${{ env.IMAGE_PREFIX }}-python-extractor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-python]
    steps:
      - uses: actions/checkout@v6
      - name: Sync compose + Caddyfile to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,infra/Caddyfile.prod"
          target: /srv/shared-cookbook/
          overwrite: true
      - name: Backup current .env before overwrite
        # Insurance against a fat-finger PROD_ENV secret update wiping
        # Azure OpenAI keys, SMTP creds, DB password, JWT signing key.
        # Keep the newest 20 backups; older ones get pruned. First-deploy
        # case (no prior .env) is a clean no-op.
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_REF: ${{ github.ref_name || github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_REF
          script: |
            set -euo pipefail
            cd /srv/shared-cookbook
            if [ ! -f .env ]; then
              echo "No existing .env — skipping backup (first deploy)."
              exit 0
            fi
            mkdir -p .env-backups
            chmod 700 .env-backups
            TS=$(date -u +%Y%m%d-%H%M%S)
            SAFE_REF=$(printf '%s' "$DEPLOY_REF" | tr -c 'A-Za-z0-9._-' '_')
            BACKUP=".env-backups/env-${TS}-pre-${SAFE_REF}.bak"
            cp .env "$BACKUP"
            chmod 600 "$BACKUP"
            echo "Backed up .env → $BACKUP"
            # Rotate: keep only the newest 20 backups.
            cd .env-backups
            ls -1t | tail -n +21 | xargs -r rm --
      - name: Write env file
        uses: appleboy/ssh-action@v1.2.5
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PROD_ENV
          script: |
            cd /srv/shared-cookbook
            printf '%s\n' "$PROD_ENV" > .env
            chmod 600 .env
      - name: Docker login on VPS (GHCR read)
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_ACTOR" --password-stdin
      - name: Pull + restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/shared-cookbook
            docker compose -f docker-compose.prod.yml pull api web python-extractor
            # BUG-016: when the compose file itself changed (e.g. network /
            # IPAM tweak), `compose up -d` alone leaves docker's embedded
            # DNS in a stale state — containers come up but `nslookup
            # postgres` returns SERVFAIL and the api crash-loops on
            # NpgsqlConnection.Open() (SIGSEGV / exit 139). The cure is a
            # full `down` + `up` so docker rebuilds the network. We only
            # pay that 20-30s downtime when the file actually changed.
            NEW_HASH=$(sha256sum docker-compose.prod.yml | cut -d' ' -f1)
            LAST_HASH=$(cat .last-compose-hash 2>/dev/null || echo "")
            if [ "$NEW_HASH" != "$LAST_HASH" ]; then
              echo "compose file changed -> full recreate (avoids docker-network DNS issues)"
              docker compose -f docker-compose.prod.yml down
            fi
            docker compose -f docker-compose.prod.yml up -d
            echo "$NEW_HASH" > .last-compose-hash
            docker image prune -f

  prune-ghcr:
    name: prune-ghcr
    # Auto-retention for the 3 container packages so GHCR storage doesn't
    # balloon. Runs after a successful deploy; each deploy produces ~3
    # untagged metadata layers per image on top of the tagged manifest,
    # so without pruning we accumulate ~10 orphan versions per tag.
    # Policy (per action defaults below): keep the 10 newest versions
    # overall; only delete versions that have NO tag at all (semver +
    # `latest` + any SHA tag survives). Safe, conservative, hands-off.
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          - shared-cookbook-api
          - shared-cookbook-web
          - shared-cookbook-python-extractor
    steps:
      - name: Delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          owner: ${{ github.repository_owner }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'true'
